<script>
async function generate() {
  const topic = document.getElementById("topic").value

  document.getElementById("status").innerText = "⏳ Generating video..."

  const res = await fetch("/api/autopilot", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ topic })
  })

  const data = await res.json()
  const projectId = data.data.project

  document.getElementById("status").innerText = "⏳ Rendering video..."

  // 🔥 WAIT LOOP
  let videoUrl = null

  for (let i = 0; i < 10; i++) {
    await new Promise(r => setTimeout(r, 3000))

    const statusRes = await fetch(
      `https://autovid-ai-6.onrender.com/status/${projectId}`
    )

    const statusData = await statusRes.json()

    console.log(statusData)

    if (statusData.movie && statusData.movie.url) {
      videoUrl = statusData.movie.url
      break
    }
  }

  if (videoUrl) {
    document.getElementById("status").innerText = "✅ Video Ready!"

    document.getElementById("result").innerHTML = `
      <video width="500" controls>
        <source src="${videoUrl}" type="video/mp4">
      </video>
    `
  } else {
    document.getElementById("status").innerText =
      "⏳ Still processing... check again later"
  }
}
</script>
