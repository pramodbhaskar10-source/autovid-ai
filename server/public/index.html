<!DOCTYPE html>
<html>
<head>
  <title>Autovid Pro</title>
</head>

<body style="font-family: Arial; text-align: center; padding: 50px;">

<h1>🎬 Autovid Pro</h1>

<input id="topic" placeholder="Enter topic..." style="padding:10px; width:300px;" />
<br><br>

<button onclick="generate()" style="padding:10px 20px;">Generate Video</button>

<p id="status"></p>
<div id="result"></div>

<script>
async function generate() {
  const topic = document.getElementById("topic").value

  document.getElementById("status").innerText = "⏳ Generating..."

  try {
    const res = await fetch("/api/autopilot", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ topic })
    })

    const data = await res.json()
    console.log("BACKEND:", data)

    const projectId = data.project

    if (!projectId) {
      document.getElementById("status").innerText = "❌ No Project ID"
      return
    }

    document.getElementById("status").innerText = "⏳ Rendering..."

    let videoUrl = null

    for (let i = 0; i < 10; i++) {
      await new Promise(r => setTimeout(r, 3000))

      const statusRes = await fetch(`/status/${projectId}`)
      const statusData = await statusRes.json()

      if (statusData.movie?.url) {
        videoUrl = statusData.movie.url
        break
      }
    }

    if (videoUrl) {
      document.getElementById("status").innerText = "✅ Done"

      document.getElementById("result").innerHTML = `
        <video width="500" controls>
          <source src="${videoUrl}" type="video/mp4">
        </video>
      `
    } else {
      document.getElementById("status").innerText = "⏳ Still processing..."
    }

  } catch (err) {
    console.error(err)
    document.getElementById("status").innerText = "❌ Error"
  }
}
</script>

</body>
</html>
